{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <div>
    <div class="brand-mark"><i class="bi bi-signpost-split"></i></div>
    <h1>Smart Traffic AI</h1>
    <p>Operations console</p>
  </div>
  <form method="post" class="vstack gap-3">
    <div>
      <label class="form-label" for="username">Username</label>
      <input class="form-control" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div>
      <label class="form-label" for="password">Password</label>
      <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn btn-primary w-100" type="submit">
      <i class="bi bi-shield-lock"></i>
      Sign in
    </button>
    <div class="small text-secondary">Default: admin / admin123</div>
  </form>
</section>
{% endblock %}
